<!DOCTYPE html>
<html lang="en" class="dark">
  <head>

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nala" />
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://cdn.plaid.com https://accounts.google.com https://appleid.cdn-apple.com https://static.cloudflareinsights.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com;
      img-src 'self' https: data:;
      connect-src 'self' http://localhost:3001 http://127.0.0.1:3001 https://stream.livenewsplay.com https://www.bloomberg.com https://d1ewctnvcwvvvu.cloudfront.net https://*.fastly.net https://*.plaid.com https://accounts.google.com https://oauth2.googleapis.com https://appleid.apple.com;
      media-src 'self' blob: https://stream.livenewsplay.com https://www.bloomberg.com https://d1ewctnvcwvvvu.cloudfront.net https://*.fastly.net;
      font-src 'self' https://fonts.gstatic.com;
      frame-src https://cdn.plaid.com https://accounts.google.com https://appleid.apple.com;
      worker-src 'self';
      object-src 'none';
      base-uri 'self';
      form-action 'self';
    ">
    <title>Nala — Portfolio Intelligence Platform</title>
    <meta property="og:title" content="Nala — Portfolio Intelligence Platform" />
    <meta property="og:description" content="Track, analyze, and share your investment portfolio with AI-powered insights" />
    <meta property="og:image" content="https://nalaai.com/og-default.png" />
    <meta property="og:url" content="https://nalaai.com" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:title" content="Nala — Portfolio Intelligence Platform" />
    <meta name="twitter:description" content="Track, analyze, and share your investment portfolio with AI-powered insights" />
    <meta name="twitter:image" content="https://nalaai.com/og-default.png" />
    <script>
      // Apply saved theme preference before page renders to prevent flash
      (function() {
        const theme = localStorage.getItem('theme');
        if (theme === 'light') {
          document.documentElement.classList.remove('dark');
        }
        // Default is dark (already has .dark class)
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
